<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>FinDash · Login</title>
  <link rel="preconnect" href="https://fonts.googleapis.com"/>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&family=Space+Grotesk:wght@500;600;700&display=swap" rel="stylesheet"/>
  <link rel="stylesheet" href="/static/css/auth.css"/>
</head>
<body>
  <div class="auth-bg">
    <div class="auth-card">
      <div class="auth-logo">
        <span class="logo-icon">◈</span>
        <span class="logo-text">Fin<strong>Dash</strong></span>
      </div>
      <h1 class="auth-title">Welcome back</h1>
      <p class="auth-sub">Sign in to your financial dashboard</p>

      <div class="auth-error" id="authError"></div>

      <div class="form-group">
        <label>Username</label>
        <input type="text" id="username" placeholder="your_username" autocomplete="username"/>
      </div>
      <div class="form-group">
        <label>Password</label>
        <div class="pw-wrap">
          <input type="password" id="password" placeholder="••••••••" autocomplete="current-password"/>
          <button type="button" class="pw-toggle" onclick="togglePw('password',this)">👁</button>
        </div>
      </div>

      <div class="auth-actions-row">
        <a href="/forgot-password" class="link-muted">Forgot password?</a>
      </div>

      <button class="btn-auth" id="loginBtn" onclick="doLogin()">Sign In</button>

      <p class="auth-switch">Don't have an account? <a href="/register">Create one</a></p>
    </div>
  </div>
  <script>
    document.addEventListener('keydown', e => { if(e.key==='Enter') doLogin(); });

    async function doLogin() {
      const btn = document.getElementById('loginBtn');
      const err = document.getElementById('authError');
      const username = document.getElementById('username').value.trim();
      const password = document.getElementById('password').value;
      err.textContent = '';
      if(!username||!password){ err.textContent='Please fill in all fields.'; return; }
      btn.disabled = true; btn.textContent = 'Signing in…';
      try {
        const r = await fetch('/api/auth/login',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({username,password})});
        const d = await r.json();
        if(!r.ok){ err.textContent = d.error; btn.disabled=false; btn.textContent='Sign In'; return; }
        window.location.href = '/dashboard';
      } catch(e){
        err.textContent = 'Network error. Please try again.';
        btn.disabled=false; btn.textContent='Sign In';
      }
    }

    function togglePw(id, btn) {
      const el = document.getElementById(id);
      el.type = el.type==='password' ? 'text' : 'password';
      btn.textContent = el.type==='password' ? '👁' : '🙈';
    }
  </script>
</body>
</html>
